name: Build Oscam-SVN Modern-ARM4K

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev libcurl4-openssl-dev libusb-1.0-0-dev zlib1g-dev libdvbcsa-dev patch curl gcc make unzip tar

      - name: Download Source Directly
        run: |
          # مسح أي محاولات فاشلة
          rm -rf *
          # تحميل الأرشيف بصيغة tar.gz (أضمن من الـ ZIP في لينكس)
          # الرابط ده "خام" ومستحيل يطلب Token
          curl -L "https://github.com/oscam-emu/oscam/archive/master.tar.gz" -o oscam.tar.gz
          
          # فك الضغط في المكان الحالي مباشرة
          tar -xzf oscam.tar.gz --strip-components=1
          rm oscam.tar.gz

      - name: Get Oscam Revision
        id: get_rev
        run: |
          # التأكد إن الملفات نزلت فعلاً عن طريق قراءة ملف الإصدار
          if [ -f "webif/pages.h" ]; then
            REV=$(grep 'SVN_REV' webif/pages.h | awk '{print $3}' | sed 's/"//g')
            echo "REV=$REV" >> $GITHUB_ENV
          else
            echo "REV=unknown" >> $GITHUB_ENV
          fi

      - name: Apply Emu Patch
        run: |
          curl -s https://raw.githubusercontent.com/oscam-emu/oscam-emu/master/oscam-emu.patch > oscam-emu.patch
          patch -p1 < oscam-emu.patch

      - name: Setup Toolchain
        run: |
          mkdir -p toolchain
          curl -L "https://github.com/stay-at-home/toolchains/raw/master/arm-newnigma2-linux-gnueabi.tar.bz2" | tar -xj -C toolchain --strip-components=1
          echo "$(pwd)/toolchain/bin" >> $GITHUB_PATH

      - name: Compile
        run: |
          make CROSS=arm-linux-gnueabi- \
               CONF_DIR=/etc/tuxbox/config \
               USE_LIBCRYPTO=1 \
               USE_LIBDVBCSA=1 \
               WEBIF=1 \
               WITH_SSL=1 \
               HAVE_DVBAPI=1 \
               WITH_EMU=1 \
               WITH_SOFTCAM=1 \
               WITH_BISS=1 \
               WITH_POWERVU=1

          # تنظيف الملف وتسميته
          arm-linux-gnueabi-strip Distribution/oscam*
          mv Distribution/oscam* ./oscam-r${{ env.REV }}-emu-ARM_4K

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: oscam-r${{ env.REV }}-ARM_4K
          path: oscam-r${{ env.REV }}-emu-ARM_4K
