name: Build Oscam-SVN Modern-ARM4K

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev libcurl4-openssl-dev libusb-1.0-0-dev zlib1g-dev libdvbcsa-dev patch curl gcc make tar xz-utils bzip2

      - name: Download Pre-Patched Oscam Source
        run: |
          # سحب سورس oscam-emu المدمج
          curl -L "https://github.com/oscam-emu/oscam-emu/archive/master.tar.gz" -o oscam.tar.gz
          mkdir -p oscam_src
          tar -xzf oscam.tar.gz -C oscam_src --strip-components=1
          rm oscam.tar.gz

      - name: Get Revision
        id: get_rev
        run: |
          # استخراج رقم النسخة من داخل مجلد السورس
          cd oscam_src
          REV=$(cat VERSION 2>/dev/null || echo "11734")
          echo "REV=$REV" >> $GITHUB_ENV

      - name: Setup Official Arm Toolchain
        run: |
          mkdir -p toolchain
          # تحميل التولشين الرسمي من Arm لضمان الاستقرار
          curl -L "https://developer.arm.com/-/media/Files/downloads/gnu/13.2.rel1/binrel/arm-gnu-toolchain-13.2.rel1-x86_64-arm-none-linux-gnueabihf.tar.xz" -o toolchain.tar.xz
          tar -xJf toolchain.tar.xz -C toolchain --strip-components=1
          rm toolchain.tar.xz
          echo "$(pwd)/toolchain/bin" >> $GITHUB_PATH

      - name: Compile & Strip (FULL CONFIGURATION)
        run: |
          # الدخول لمجلد السورس قبل البدء في الـ Make
          cd oscam_src
          make CROSS=arm-none-linux-gnueabihf- \
               CONF_DIR=/etc/tuxbox/config \
               USE_LIBCRYPTO=1 \
               USE_LIBDVBCSA=1 \
               WEBIF=1 \
               WEBIF_LIVELOG=1 \
               WEBIF_JQUERY=1 \
               WEBIF_UPNP=1 \
               TOUCH=0 \
               WITH_SSL=1 \
               HAVE_DVBAPI=1 \
               WITH_NEUTRINO=0 \
               READ_SDT_CHARSETS=1 \
               IRDETO_GUESSING=1 \
               CS_ANTICASC=0 \
               WITH_DEBUG=1 \
               MODULE_MONITOR=1 \
               WITH_LB=1 \
               CS_CACHEEX=1 \
               CS_CACHEEX_AIO=0 \
               CW_CYCLE_CHECK=1 \
               LCDSUPPORT=0 \
               LEDSUPPORT=0 \
               CLOCKFIX=1 \
               IPV6SUPPORT=1 \
               WITH_LIBCURL=1 \
               WITH_EMU=1 \
               WITH_SOFTCAM=1 \
               MODULE_CAMD33=1 \
               MODULE_CAMD35=1 \
               MODULE_CAMD35_TCP=1 \
               MODULE_NEWCAMD=1 \
               MODULE_CCCAM=1 \
               MODULE_CCCSHARE=1 \
               MODULE_GBOX=1 \
               MODULE_RADEGAST=1 \
               MODULE_SERIAL=1 \
               MODULE_CONSTCW=1 \
               MODULE_PANDORA=1 \
               MODULE_GHTTP=1 \
               MODULE_SCAM=1 \
               MODULE_STREAMRELAY=1 \
               SOFTCAM_KEY=1 \
               READER_NAGRA=1 \
               READER_NAGRA_MERLIN=1 \
               READER_IRDETO=1 \
               READER_CONAX=1 \
               READER_CRYPTOWORKS=1 \
               READER_SECA=1 \
               READER_VIACCESS=1 \
               READER_VIDEOGUARD=1 \
               READER_DRE=1 \
               READER_TONGFANG=1 \
               READER_BULCRYPT=1 \
               READER_GRIFFIN=1 \
               READER_DGCRYPT=1 \
               READER_PCSC=0 \
               READER_SMARGO=0 \
               READER_DB2COM=0 \
               READER_STINGER=0 \
               READER_EMU=1 \
               WITH_BISS=1 \
               WITH_LONG_BISS=1 \
               WITH_POWERVU=1 \
               WITH_TANDBERG=1 \
               WITH_DRECAS=1 \
               WITH_SCRYPT=1

          # تنظيف الملف ونقله للمجلد الرئيسي للرفع
          arm-none-linux-gnueabihf-strip Distribution/oscam*
          cp Distribution/oscam* ../oscam-r${{ env.REV }}-emu-ARM_4K

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: oscam-r${{ env.REV }}-ARM_4K
          path: oscam-r${{ env.REV }}-emu-ARM_4K
