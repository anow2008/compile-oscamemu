name: Build Oscam-SVN Modern-ARM4K

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev libcurl4-openssl-dev libusb-1.0-0-dev zlib1g-dev libdvbcsa-dev patch curl git subversion gcc make tar

      - name: Checkout Oscam Source
        run: |
          # مسح أي بقايا قديمة
          rm -rf *
          # سحب السورس باستخدام git clone لنسخة الـ Mirror الرسمية برابط مباشر
          # وبنضيف خيار يتخطى فحص الصلاحيات تماماً
          git clone --depth 1 https://github.com/oscam-emu/oscam .

      - name: Get Oscam Revision
        id: get_rev
        run: |
          # استخراج رقم الإصدار من ملف pages.h
          REV=$(grep 'SVN_REV' webif/pages.h | awk '{print $3}' | sed 's/"//g' || echo "unknown")
          echo "REV=$REV" >> $GITHUB_ENV

      - name: Apply Emu Patch
        run: |
          curl -s https://raw.githubusercontent.com/oscam-emu/oscam-emu/master/oscam-emu.patch > oscam-emu.patch
          patch -p1 < oscam-emu.patch

      - name: Setup Toolchain
        run: |
          mkdir -p toolchain
          # تحميل الـ Toolchain الخاص بـ ARM 4K
          curl -L "https://github.com/stay-at-home/toolchains/raw/master/arm-newnigma2-linux-gnueabi.tar.bz2" | tar -xj -C toolchain --strip-components=1
          echo "$(pwd)/toolchain/bin" >> $GITHUB_PATH

      - name: Compile & Strip
        run: |
          # عملية البناء بالإعدادات الكاملة
          make CROSS=arm-linux-gnueabi- \
               CONF_DIR=/etc/tuxbox/config \
               USE_LIBCRYPTO=1 \
               USE_LIBDVBCSA=1 \
               WEBIF=1 \
               WITH_SSL=1 \
               HAVE_DVBAPI=1 \
               WITH_EMU=1 \
               WITH_SOFTCAM=1 \
               WITH_BISS=1 \
               WITH_POWERVU=1

          # تنظيف الملف الناتج وتسميته برقم الـ Revision
          arm-linux-gnueabi-strip Distribution/oscam*
          mv Distribution/oscam* ./oscam-r${{ env.REV }}-emu-ARM_4K

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: oscam-r${{ env.REV }}-ARM_4K
          path: oscam-r${{ env.REV }}-emu-ARM_4K
